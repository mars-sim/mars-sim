name: SonarQube Analysis

on:
  # Trigger analysis when pushing in master (canonical repo only; job-level if guards below)
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sonarqube:
    # Only run in the canonical repository and not for Dependabot
    if: ${{ github.repository == 'mars-sim/mars-sim' && github.actor != 'dependabot[bot]' }}
    name: SonarQube Trigger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history improves Sonar blame data
          fetch-depth: 0

      # Setup Java 25
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_LOGIN }}
          SONAR_PROJECT: ${{ secrets.SONAR_PROJECT }}
          SONAR_ORGANISATION: ${{ secrets.SONAR_ORGANISATION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B -Pcoverage  verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=$SONAR_PROJECT -Dsonar.organization=$SONAR_ORGANISATION
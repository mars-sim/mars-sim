name: Create Release

# This workflow is triggered on user request
on:
  workflow_dispatch:

# Make sure the GITHUB_TOKEN has permission to upload to our releases
permissions:
  contents: write

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Set up JDK 25
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        java-version: 25
        distribution: 'temurin'
        cache: 'maven'    
    - name: Build with Maven
      run:
        mvn  --file pom.xml -B package
    - name: Extract build version
      run: echo "POM_VERSION=$(mvn org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
    - name: Create tag
      run: |
        git tag v${{ env.POM_VERSION }}
        git push origin tag v${{ env.POM_VERSION }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Create Release
      run: |
        cd ${{github.workspace}}
        gh release create v${{ env.POM_VERSION }} ./mars-sim-dist/target/mars-sim-${{ env.POM_VERSION }}.zip --generate-notes --verify-tag --draft --title 'Release v${{ env.POM_VERSION }}'    
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

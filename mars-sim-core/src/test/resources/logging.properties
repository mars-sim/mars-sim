# Test logging configuration for mars-sim-core unit tests
# Keep normal INFO logging by default, but suppress chatty mars-sim package INFO logs.

handlers= java.util.logging.ConsoleHandler

.level= INFO
com.mars_sim.level= WARNING

java.util.logging.ConsoleHandler.level = ALL
# java.util.logging.ConsoleHandler.level = INFO
# java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter
java.util.logging.ConsoleHandler.filter = com.mars_sim.core.logging.SimuLoggingFilter
java.util.logging.ConsoleHandler.formatter = com.mars_sim.core.logging.SimuLoggingFormatter
